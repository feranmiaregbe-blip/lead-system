<!DOCTYPE html>
<html>
<head>
    <title>Saved Leads</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 600px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .table-wrapper{
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            min-width: 400px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f0f0f0;
        }

        button {
            background-color: black;
            color: rgb(230, 225, 225);
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.3s ease;
        }

        @media (max-width:500px){
            .container{
                padding: 15px;
                font-size: 14px;
            }
        }
        button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Saved Leads</h2>

    <form action="/" method="get">
        <button type="submit">Add New Lead</button>
    </form>
    
    <form method="GET" action="/leads">
    <input type="text" name="search" placeholder="Search...">
    <button type="submit">Search</button>
    </form>

    <div class="table-wrapper"></div>
    {% if leads %}
    <table>
        <tr>
            <th>Name</th>
            <th>Location</th>
            <th>Budget</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        {% for index, lead in leads %}
        <tr>
            <td>{{ lead[0] }}</td>
            <td>{{ lead[1] }}</td>
            <td>{{ lead[2] }}</td>
            <td>{{ lead[3] }}</td>
            <td>
                <a href="/edit/{{index}}">
                    <button>Edit</button>
                </a>
                <a href="/delete/{{index}}">
                    <button>Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>No leads yet.</p>
    {% endif %}

</div>

</body>
</html>
