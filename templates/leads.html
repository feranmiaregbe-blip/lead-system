<!DOCTYPE html>
<html>
<head>
    <title>Leads Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            padding: 20px;
        }

        h2 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #2f3640;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        button {
            padding: 6px 12px;
            border: none;
            background: #273c75;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #40739e;
        }

        .top-bar {
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h2>📊 Leads Dashboard</h2>
    <a href="/"><button>Add New Lead</button></a>
    <a href="/logout"><button>Logout</button></a>
</div>

<table>
    <tr>
        <th>Name</th>
        <th>Location</th>
        <th>Budget</th>
        <th>Date</th>
        <th>Actions</th>
    </tr>

    {% for lead in leads %}
    <tr>
        <td>{{ lead[2] }}</td>
        <td>{{ lead[3] }}</td>
        <td>{{ lead[4] }}</td>
        <td>{{ lead[5] }}</td>
        <td>
            <a href="/delete/{{ lead[0] }}">
                <button>Delete</button>
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
