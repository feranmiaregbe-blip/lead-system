<!DOCTYPE html>
<html>
<head>
    <title>Add Lead</title>

    <style>
        body {
            background: #0f127a;
            font-family: 'Segoe UI';
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
        }
        
    </style>

</head>

<body>

<div class="form-box">
    <h2>Add Lead</h2>

    <form action="/add_lead" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="location" placeholder="Location" required>
        <input type="text" name="budget" placeholder="Budget" required>
        <input type="text" name="phone" placeholder="Client Phone Number">

        <button type="submit">Save Lead</button>

</form>

</div>

</body>
</html>
