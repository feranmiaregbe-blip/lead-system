<!DOCTYPE html>
<html>
<head>
    <title>Lead System</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 5px;
        }

        button {
            background-color: black;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        button:hover{
            background-color: #333;
        }

        a {
            display: block;
            margin-bottom: 15px;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Add New Lead</h2>

<a href="/leads">View All Leads</a>

<form method="POST" action="/add_lead">

<input type="text" name="name" placeholder="Customer Name" required><br>

<input type="text" name="location" placeholder="Location" required><br>

<input type="number" name="budget" placeholder="Budget" required><br>

<button type="submit">Save Lead</button>

</form>

</div>

</body>
</html>
