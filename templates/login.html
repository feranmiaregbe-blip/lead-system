<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f4f6f8; }
        .box { background: white; padding: 20px; margin: 100px auto; width: 300px; border-radius: 10px; }
        input { width: 90%; padding: 8px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background: black; color: white; border: none; }
    </style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<form method="POST">
    <input type="text" name="username" placeholder="Username"><br>
    <input type="password" name="password" placeholder="Password"><br>
    <button type="submit">Login</button>
</form>
</div>
</body>
</html>
